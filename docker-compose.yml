services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies checked-in migrations, then seeds the demo sources —
  # but only on a fresh/empty database (seed-if-empty.ts), so restarting the
  # stack never wipes crawled data. api/worker wait for this to finish.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scraper
      REDIS_URL: redis://redis:6379
    working_dir: /app/packages/db
    command: sh -c "pnpm exec prisma migrate deploy && pnpm exec tsx prisma/seed-if-empty.ts"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scraper
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_PORT: 4000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scraper
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    environment:
      PORT: 3000
      # Server components run inside the container and must use Docker's
      # internal DNS; the browser runs on the host and needs the published
      # port instead. NEXT_PUBLIC_* is inlined at build time, so this only
      # takes effect on the next image rebuild.
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  pgdata:
